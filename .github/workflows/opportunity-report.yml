name: HDN Opportunity Report

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build opportunity scores and report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
        run: python scripts/build_opportunity_report.py

      - name: Commit report
        run: |
          if git diff --quiet -- data/opportunities reports/daily; then
            echo "No report changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/opportunities/latest.json reports/daily
          git commit -m "Update HDN opportunity report [skip ci]"
          git push
