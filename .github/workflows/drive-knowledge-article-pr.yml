name: Google Drive Knowledge Base Article PR

on:
  workflow_dispatch:
    inputs:
      min_score:
        description: Minimum AI score required for drafting
        required: true
        default: '70'
        type: string
      document_id:
        description: Optional Google Docs file ID for manual diagnostics
        required: false
        default: ''
        type: string
      dry_run:
        description: Fetch Drive/Docs only without calling OpenAI
        required: true
        default: false
        type: boolean
  schedule:
    - cron: '0 21 * * 0-4'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        id: pip_install
        run: |
          start=$(date +%s)
          echo "START pip install"
          pip install -r requirements.txt
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END pip install: ${elapsed}s"
          echo "pip_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Restore persistent knowledge-base state
        id: restore_state
        run: |
          start=$(date +%s)
          echo "START restore persistent knowledge-base state"
          mkdir -p data/knowledge-base
          if git ls-remote --exit-code --heads origin knowledge-base-state > /dev/null 2>&1; then
            git fetch origin knowledge-base-state
            git show origin/knowledge-base-state:data/knowledge-base/processed-docs.json > data/knowledge-base/processed-docs.json || true
            git show origin/knowledge-base-state:data/knowledge-base/latest-run.json > data/knowledge-base/latest-run.json || true
            echo "Restored knowledge-base state from knowledge-base-state."
          else
            echo "No knowledge-base-state branch exists yet."
          fi
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END restore persistent knowledge-base state: ${elapsed}s"
          echo "cache_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Collect Google Docs already used by open pull requests
        id: collect_prs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          start=$(date +%s)
          echo "START collect open PR Google Docs references"
          if timeout 20s gh pr list --state open --limit 50 --json body > /tmp/open-prs.json; then
            echo "Open PR metadata collected."
          else
            echo "WARN: open PR metadata collection timed out or failed; continuing with an empty exclusion list."
            echo "[]" > /tmp/open-prs.json
          fi
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          payload = json.loads(Path('/tmp/open-prs.json').read_text(encoding='utf-8'))
          tokens = set()
          for item in payload:
              body = item.get('body') or ''
              for match in re.findall(r'https://docs\.google\.com/document/d/[\w-]+[^\s)]*', body):
                  tokens.add(match.rstrip(').,]'))
              for match in re.findall(r'Google Drive file ID:\s*([\w-]+)', body):
                  tokens.add(match)
          Path('/tmp/open-pr-drive-docs.txt').write_text('\n'.join(sorted(tokens)), encoding='utf-8')
          print(f'Excluded {len(tokens)} Google Docs references from open pull requests')
          PY
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END collect open PR Google Docs references: ${elapsed}s"
          echo "github_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Generate one Drive knowledge-base article draft
        id: drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_DRIVE_KNOWLEDGE_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_KNOWLEDGE_FOLDER_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5-mini' }}
          MIN_SCORE: ${{ inputs.min_score || '70' }}
          DOCUMENT_ID: ${{ inputs.document_id || '' }}
          DRY_RUN: ${{ inputs.dry_run || false }}
          PYTHONUNBUFFERED: '1'
        run: |
          start=$(date +%s)
          echo "START bounded Python runner"
          args=(
            scripts/generate_from_drive_knowledge.py
            --folder-id "$GOOGLE_DRIVE_KNOWLEDGE_FOLDER_ID"
            --service-account-json "$GOOGLE_SERVICE_ACCOUNT_JSON"
            --exclude-file /tmp/open-pr-drive-docs.txt
            --min-score "$MIN_SCORE"
            --state-path data/knowledge-base/processed-docs.json
            --report-path data/knowledge-base/latest-run.json
            --max-drive-files 5
          )
          if [ -n "$DOCUMENT_ID" ]; then
            args+=(--document-id "$DOCUMENT_ID")
          fi
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi

          set +e
          timeout --signal=TERM --kill-after=15s 240s python "${args[@]}"
          status=$?
          set -e
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END bounded Python runner: ${elapsed}s status=${status}"

          if [ "$status" -eq 124 ] || [ "$status" -eq 137 ] || [ "$status" -eq 143 ]; then
            echo "Python runner hit OS timeout; recording normal operational timeout result."
            mkdir -p data/knowledge-base
            python3 - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          state_path = Path("data/knowledge-base/processed-docs.json")
          report_path = Path("data/knowledge-base/latest-run.json")
          state = json.loads(state_path.read_text(encoding="utf-8")) if state_path.exists() else {"documents": {}}
          now = datetime.now(timezone.utc).isoformat()
          selected_id = ""
          selected_name = ""
          for doc_id, record in state.get("documents", {}).items():
              if record.get("status") == "processing":
                  selected_id = doc_id
                  selected_name = record.get("name", "")
                  record["status"] = "os_timeout"
                  record["finishedAt"] = now
                  record["retry_count"] = int(record.get("retry_count", 0)) + 1
          state["updatedAt"] = now
          report = {
              "selected": False,
              "reason": "os_timeout",
              "createdAt": now,
              "fileId": selected_id,
              "name": selected_name,
              "metrics": {
                  "selectedDocumentId": selected_id,
                  "selectedDocumentName": selected_name,
                  "exitReason": "os_timeout",
                  "executionSeconds": 240,
                  "articlesGenerated": 0
              }
          }
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY
            echo "selected=false" >> "$GITHUB_OUTPUT"
            echo "reason=os_timeout" >> "$GITHUB_OUTPUT"
            echo "exitReason=os_timeout" >> "$GITHUB_OUTPUT"
            echo "executionSeconds=240" >> "$GITHUB_OUTPUT"
            echo "articlesGenerated=0" >> "$GITHUB_OUTPUT"
          elif [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Upload knowledge-base run state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-base-state-${{ github.run_id }}
          path: data/knowledge-base/
          if-no-files-found: warn
          retention-days: 30

      - name: Persist knowledge-base state branch
        id: persist_state
        if: always()
        run: |
          start=$(date +%s)
          echo "START persist knowledge-base state branch"
          if [ ! -d data/knowledge-base ]; then
            echo "No state directory to persist."
            echo "github_seconds=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          tmpdir="$(mktemp -d)"
          statecopy="$tmpdir/knowledge-base"
          worktree="$tmpdir/state-worktree"
          cp -R data/knowledge-base "$statecopy"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin knowledge-base-state > /dev/null 2>&1; then
            git fetch origin knowledge-base-state
            git worktree add "$worktree" origin/knowledge-base-state
            cd "$worktree"
            git checkout -B knowledge-base-state
          else
            git worktree add --detach "$worktree" HEAD
            cd "$worktree"
            git checkout --orphan knowledge-base-state
            git rm -r --cached . || true
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi
          mkdir -p data
          rm -rf data/knowledge-base
          cp -R "$statecopy" data/knowledge-base
          git add data/knowledge-base
          if git diff --cached --quiet; then
            echo "Knowledge-base state is unchanged."
          else
            git commit -m "Update knowledge-base processing state [skip ci]"
            git push origin knowledge-base-state
          fi
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END persist knowledge-base state branch: ${elapsed}s"
          echo "github_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Report no eligible document
        if: steps.drive.outputs.selected != 'true'
        run: |
          echo "No eligible Google Docs document was generated."
          echo "Reason: ${{ steps.drive.outputs.reason }}"

      - name: Set up Node
        if: steps.drive.outputs.selected == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install site dependencies
        id: npm_install
        if: steps.drive.outputs.selected == 'true'
        run: |
          start=$(date +%s)
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          end=$(date +%s)
          elapsed=$((end - start))
          echo "npm_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Build and validate site
        if: steps.drive.outputs.selected == 'true'
        env:
          PUBLIC_SITE_URL: https://hatchyz-coder.github.io
          BASE_PATH: /hdn-articles
        run: npm run build

      - name: Create draft pull request
        id: create_article_pr
        if: steps.drive.outputs.selected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.drive.outputs.slug }}
          FILE_ID: ${{ steps.drive.outputs.file_id }}
          SOURCE_URL: ${{ steps.drive.outputs.source_url }}
          SOURCE_NAME: ${{ steps.drive.outputs.source_name }}
          MODIFIED_TIME: ${{ steps.drive.outputs.modified_time }}
          SCORE: ${{ steps.drive.outputs.score }}
          EEAT: ${{ steps.drive.outputs.eeat }}
          RESEARCH_REVIEW: ${{ steps.drive.outputs.research_review }}
        run: |
          start=$(date +%s)
          echo "Creating PR..."
          echo "START create article draft pull request"
          branch="content/drive-knowledge-${SLUG}-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/articles social outputs/en
          git commit -m "Generate Drive knowledge article draft: ${SLUG}"
          git push origin "$branch"
          cat > /tmp/pr-body.md <<EOF
          ## Google Drive knowledge-base article draft

          - Source document: ${SOURCE_NAME}
          - Source URL: ${SOURCE_URL}
          - Google Drive file ID: ${FILE_ID}
          - Source updated at: ${MODIFIED_TIME}
          - AI score: ${SCORE}/100
          - E-E-A-T: ${EEAT}
          - Official-source review prep: ${RESEARCH_REVIEW}

          ## Generated files

          - Article: \`src/content/articles/${SLUG}.md\`
          - Social drafts: \`social/${SLUG}/\`
          - English draft: \`outputs/en/${SLUG}.md\`
          - Processing state: persisted on the \`knowledge-base-state\` branch and uploaded as a workflow artifact

          ## Review checklist

          - [ ] The source document URL and updated time are correct
          - [ ] No company names, patient information, personal information, contract terms, or confidential details are included
          - [ ] Facts come from the source document or are clearly framed as editorial guidance
          - [ ] No unsupported medical, legal, advertising, or performance claims appear
          - [ ] SEO title, description, headings, FAQ, reference information, update date, author, and CTA are appropriate
          - [ ] Additional verification topics, official-source candidates, and unsupported claims have been checked
          - [ ] Japanese article, English draft, Facebook, LinkedIn, and X drafts are suitable for review
          - [ ] Keep this pull request as Draft until human approval is complete
          - [ ] Change \`draft: true\` to \`draft: false\` only after editorial approval
          EOF
          gh pr create \
            --draft \
            --base main \
            --head "$branch" \
            --title "Drive knowledge article draft: ${SLUG}" \
            --body-file /tmp/pr-body.md
          end=$(date +%s)
          elapsed=$((end - start))
          echo "END create article draft pull request: ${elapsed}s"
          echo "github_seconds=${elapsed}" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        if: always()
        run: |
          github_seconds=$(( \
            ${{ steps.collect_prs.outputs.github_seconds || '0' }} + \
            ${{ steps.persist_state.outputs.github_seconds || '0' }} + \
            ${{ steps.create_article_pr.outputs.github_seconds || '0' }} \
          ))
          cache_seconds=${{ steps.restore_state.outputs.cache_seconds || '0' }}
          {
            echo "## Google Drive Knowledge Base Article PR"
            echo ""
            echo "| Metric | Value |"
            echo "| --- | ---: |"
            echo "| Last completed step | ${{ steps.drive.outputs.lastCompletedStep || 'not recorded' }} |"
            echo "| 選定Document ID | ${{ steps.drive.outputs.selectedDocumentId || '' }} |"
            echo "| 文書名 | ${{ steps.drive.outputs.selectedDocumentName || '' }} |"
            echo "| Drive処理秒数 | ${{ steps.drive.outputs.driveSeconds || '0' }} |"
            echo "| Docs本文取得秒数 | ${{ steps.drive.outputs.docsFetchSeconds || '0' }} |"
            echo "| OpenAI処理秒数 | ${{ steps.drive.outputs.openaiSeconds || '0' }} |"
            echo "| state保存秒数 | ${{ steps.drive.outputs.stateSaveSeconds || '0' }} |"
            echo "| OpenAI API呼び出し回数 | ${{ steps.drive.outputs.apiCalls || '0' }} |"
            echo "| 入力文字数 | ${{ steps.drive.outputs.inputCharacters || '0' }} |"
            echo "| 終了理由 | ${{ steps.drive.outputs.exitReason || steps.drive.outputs.reason || '' }} |"
            echo "| 総実行時間 | ${{ steps.drive.outputs.executionSeconds || '0' }} |"
            echo "| Drive取得件数 | ${{ steps.drive.outputs.driveFetched || '0' }} |"
            echo "| 新規件数 | ${{ steps.drive.outputs.newDocuments || '0' }} |"
            echo "| 記事生成件数 | ${{ steps.drive.outputs.articlesGenerated || '0' }} |"
            echo "| GitHub処理秒数 | ${github_seconds} |"
            echo "| キャッシュ復元秒数 | ${cache_seconds} |"
            echo "| pip install秒数 | ${{ steps.pip_install.outputs.pip_seconds || '0' }} |"
            echo "| npm install秒数 | ${{ steps.npm_install.outputs.npm_seconds || '0' }} |"
          } >> "$GITHUB_STEP_SUMMARY"
